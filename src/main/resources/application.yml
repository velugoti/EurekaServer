server:
  port: 8761

spring:
  application:
    name: eureka-server

  zipkin:
    base-url: http://localhost:9411

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false

  server:
    enable-self-preservation: false

management:
  tracing:
    sampling:
      probability: 1.0